<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>3DXML 查看器</title>

<!-- PWA / 添加到主屏幕 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="3DXML 查看器">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json" crossorigin="use-credentials">
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --accent: #e94560;
  --text: #eee;
  --text2: #aaa;
  --safe-bottom: env(safe-area-inset-bottom, 12px);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
#canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }

/* 顶栏 */
#toolbar { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; padding:10px 12px; gap:10px; background:linear-gradient(180deg,rgba(22,33,62,0.95),rgba(22,33,62,0)); pointer-events:none; }
#toolbar > * { pointer-events:auto; }
#toolbar button { width:40px; height:40px; border-radius:12px; border:none; background:var(--panel); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.3); transition:transform 0.15s; }
#toolbar button:active { transform:scale(0.92); }
#toolbar .title { flex:1; color:var(--text); font-size:15px; font-weight:600; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 4px rgba(0,0,0,0.5); }
#toolbar .hint { font-size:11px; color:var(--text2); }

/* 底部手势提示 */
#gesture-hint { position:fixed; bottom:calc(var(--safe-bottom) + 16px); left:50%; transform:translateX(-50%); z-index:10; color:var(--text2); font-size:11px; background:rgba(22,33,62,0.85); padding:8px 16px; border-radius:20px; pointer-events:none; transition:opacity 0.8s; }
#welcome { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; text-align:center; pointer-events:none; color:var(--text2); }
#welcome .icon { font-size:60px; display:block; margin-bottom:12px; }
#welcome .msg { font-size:16px; color:var(--text); font-weight:600; }
#welcome .sub { font-size:12px; margin-top:6px; }

/* 加载画面 */
#loading { position:fixed; top:0; left:0; width:100%; height:100%; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); }
#loading.hidden { display:none; }
.spinner { width:48px; height:48px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { margin-top:16px; color:var(--text); font-size:14px; }

/* 结构树侧边栏 */
#tree-panel { position:fixed; top:0; left:0; width:320px; min-width:220px; max-width:85vw; height:100%; z-index:15; background:var(--panel); transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; box-shadow:2px 0 16px rgba(0,0,0,0.4); }
#tree-panel.open { transform:translateX(0); }
.tree-resizer { position:absolute; top:0; right:0; width:6px; height:100%; cursor:ew-resize; z-index:2; }
.tree-resizer:hover, .tree-resizer.active { background:var(--accent); }
#tree-panel .head { padding:16px 14px 12px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:8px; flex-shrink:0; }
#tree-panel .head span { flex:1; color:var(--text); font-size:15px; font-weight:600; }
#tree-panel .head button { width:32px; height:32px; border-radius:8px; border:none; background:rgba(255,255,255,0.08); color:var(--text); font-size:16px; cursor:pointer; }
#tree-list { flex:1; overflow:auto; padding:8px 0; -webkit-overflow-scrolling:touch; }
#tree-list::-webkit-scrollbar { width:3px; height:3px; }
#tree-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
.tree-node { display:flex; align-items:center; padding:10px 14px; cursor:pointer; border-left:3px solid transparent; transition:background 0.15s; user-select:none; -webkit-user-select:none; }
.tree-node:active { background:rgba(255,255,255,0.06); }
.tree-node.selected { background:rgba(0,204,68,0.15); border-left-color:#00cc44; }
.tree-node .icon { width:22px; height:22px; margin-right:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.tree-node .name { color:var(--text); font-size:13px; white-space:nowrap; }
.tree-node .check { width:16px; height:16px; margin-right:6px; flex-shrink:0; accent-color:var(--accent); cursor:pointer; }
.tree-node .arrow { width:20px; height:20px; margin-right:4px; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text2); transition:transform 0.2s; flex-shrink:0; }
.tree-node .arrow.expanded { transform:rotate(90deg); }
.tree-children { overflow:hidden; transition:max-height 0.25s ease; }
.tree-children.collapsed { max-height:0 !important; }

/* 滑动开关 */
.toggle-switch { position:relative; display:inline-block; width:36px; height:20px; background:rgba(255,255,255,0.15); border-radius:10px; transition:background 0.25s; }
.toggle-switch .toggle-knob { position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:50%; transition:transform 0.25s; }
#chk-follow:checked + .toggle-switch { background:var(--accent); }
#chk-follow:checked + .toggle-switch .toggle-knob { transform:translateX(16px); }

/* 遮罩 */
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:14; background:rgba(0,0,0,0.3); display:none; pointer-events:none; }
#overlay.show { display:block; pointer-events:auto; }
</style>
</head>
<body>

<!-- 3D画布 -->
<div id="canvas"></div>

<!-- 顶栏 -->
<div id="toolbar">
  <button id="btn-tree" title="结构树" style="font-size:20px;font-weight:700;">☰</button>
  <span class="title" id="title-text">3DXML 查看器</span>
  <button id="btn-open" title="打开文件">📂</button>
  <button id="btn-fit" title="适应视图"><img src="shoushuo.png" style="width:20px;height:20px;object-fit:contain;"></button>
  <button id="btn-install" title="安装APP" style="display:none">📲</button>
</div>

<!-- 加载画面 -->
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <p id="loading-text">加载中...</p>
</div>

<!-- 欢迎提示 -->
<div id="welcome"><span class="icon">📂</span><span class="msg">点击右上角按钮</span><span class="sub">选择 .3dxml + .3DRep 文件查看模型</span></div>

<!-- 视觉跟随滑动开关（🔍按钮下方） -->
<label id="lbl-follow" style="position:fixed;top:56px;right:12px;z-index:11;display:flex;align-items:center;gap:6px;color:var(--text);font-size:12px;cursor:pointer;background:var(--panel);padding:6px 10px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.3);pointer-events:auto;user-select:none;">
  <span>视觉跟随</span>
  <input type="checkbox" id="chk-follow" checked style="position:absolute;opacity:0;width:0;height:0;">
  <span class="toggle-switch"><span class="toggle-knob"></span></span>
</label>

<!-- 底部手势提示 -->
<div id="gesture-hint">👆 单指旋转 &nbsp;👆👆 双指缩放/平移 &nbsp;👆👆 双击聚焦</div>

<!-- 结构树遮罩 -->
<div id="overlay"></div>

<!-- 结构树侧边栏 -->
<div id="tree-panel">
  <div class="head">
    <span>📋 结构树</span>
    <button id="btn-tree-close">✕</button>
  </div>
  <div id="tree-list"></div>
  <div class="tree-resizer" id="tree-resizer"></div>
</div>

<!-- 隐藏的文件选择器：支持多选（3dxml + 3DRep） -->
<input type="file" id="file-input" accept=".3dxml,.3DXML,.3DRep,.3drep,.3mf,.3MF,.stp,.step" multiple style="display:none">


<!-- JSZip -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- Three.js Import Map（使用jsdelivr CDN，国内可访问） -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════
// DOM 引用
// ═══════════════════════════════════════════════════
const canvasEl = document.getElementById('canvas');
const loadingEl = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const titleText = document.getElementById('title-text');
const treeList = document.getElementById('tree-list');
const treePanel = document.getElementById('tree-panel');
const overlay = document.getElementById('overlay');
const gestureHint = document.getElementById('gesture-hint');
const fileInput = document.getElementById('file-input');

// ═══════════════════════════════════════════════════
// Three.js 场景初始化
// ═══════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
canvasEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500000);
camera.position.set(15, 10, 18);  // 标准 Three.js Y-up 视角
camera.up.set(0, 1, 0);           // 标准 Y-up

// OrbitControls（触控优化，距离限制动态调整）
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.target.set(0, 0, 0);
controls.minDistance = 0.01;
controls.maxDistance = Infinity;
controls.maxPolarAngle = Math.PI;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.update();

// 灯光
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(20, 30, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200000;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// 地面网格
const gridHelper = new THREE.GridHelper(40, 40, 0x333355, 0x222244);
scene.add(gridHelper);

// 根节点
// 根节点：CATIA Z-up → Three.js Y-up（绕X轴-90°，只转一次）
const rootGroup = new THREE.Group();
rootGroup.name = '__root__';
rootGroup.quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
scene.add(rootGroup);

// 选中高亮材质
const highlightMaterial = new THREE.MeshBasicMaterial({
  color: 0x00cc44,
  transparent: true,
  opacity: 0.4,
  depthTest: true,
  depthWrite: false,
  side: THREE.DoubleSide
});

// 全局状态
let modelTreeData = null;
let entityMap = new Map();     // tree node id → THREE.Object3D
let selectedNodeId = null;
let highlightMeshes = [];

// ═══════════════════════════════════════════════════
// 3DXML 解析器
// ═══════════════════════════════════════════════════
class ThreeDXMLParser {
  constructor() {
    this.treeDict = {};       // id → node info
    this.repDict = {};        // id → rep info
    this.repFileMap = {};     // rep filename → rep file content
    this.modelRoot = 0;
    this.fileName = '';
    this.isUVR = false;       // UVR 二进制格式 → 用球体渲染
    this.is3MF = false;       // 3MF 格式
    this.mf3Data = null;      // 3MF 解析后的几何数据
    this._cloneId = 1000000;  // 克隆节点唯一ID
  }

  // 检测文件是否为 ZIP 格式（PK 头）
  async _readFileAsBuffer(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(new Uint8Array(reader.result));
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  _isZip(bytes) {
    return bytes.length >= 2 && bytes[0] === 0x50 && bytes[1] === 0x4B;
  }

  async load(files) {
    // files 可以是单个 File（ZIP 或 XML）或 File 数组
    const fileList = Array.isArray(files) ? files : [files];
    if (fileList.length === 0) throw new Error('未选择文件');

    showLoading(true);

    // 分类文件：找到 .3dxml / .3mf 和所有 .3DRep
    let xmlFile = null;
    let mf3File = null;
    const repFiles = []; // { name, file }

    for (const f of fileList) {
      const name = f.name;
      const upper = name.toUpperCase();
      if (upper.endsWith('.3DXML')) {
        xmlFile = f;
      } else if (upper.endsWith('.3MF')) {
        mf3File = f;
      } else if (upper.endsWith('.3DREP')) {
        repFiles.push({ name: name.split('/').pop().split('\\').pop(), file: f });
      }
    }

    // ──── 3MF 格式 ────
    if (mf3File) {
      this.fileName = mf3File.name;
      loadingText.textContent = '正在解析 3MF...';
      const mf3Buffer = await this._readFileAsBuffer(mf3File);
      return this.parse3MF(mf3Buffer);
    }

    if (!xmlFile) throw new Error('未找到 .3dxml 或 .3mf 文件，请选择 .3dxml(+.3DRep) 或 .3mf 文件');

    this.fileName = xmlFile.name;

    // 读取第一个文件的前2字节判断是否为ZIP
    const header = await this._readFileAsBuffer(xmlFile);
    const isZip = this._isZip(header);

    if (isZip) {
      // ──── ZIP 格式：内部包含 .3dxml + .3DRep ────
      loadingText.textContent = '正在解压 3DXML (ZIP)...';
      const zip = await JSZip.loadAsync(xmlFile);
      const filePaths = Object.keys(zip.files).filter(f => !zip.files[f].dir);
      let xmlContent = null;
      const repContents = {};

      for (const fpath of filePaths) {
        const upper = fpath.toUpperCase();
        const base = fpath.split('/').pop();
        if (upper.endsWith('.3DXML')) {
          xmlContent = await zip.files[fpath].async('text');
        } else if (upper.endsWith('.3DREP')) {
          repContents[base] = await zip.files[fpath].async('text');
        }
      }
      if (!xmlContent) throw new Error('ZIP 中未找到 .3dxml 文件');
      this.repFileMap = repContents;
      loadingText.textContent = '正在解析模型结构...';
      this.parseXML(xmlContent);

    } else {
      // ──── 纯 XML 格式：.3dxml + 独立 .3DRep 文件 ────
      loadingText.textContent = '正在解析 XML 结构...';
      const decoder = new TextDecoder();
      const xmlContent = decoder.decode(header);
      this.repFileMap = {};

      // 读取所有 3DRep 文件
      if (repFiles.length > 0) {
        loadingText.textContent = '正在读取 3DRep 几何文件...';
        for (const { name, file } of repFiles) {
          const buf = await this._readFileAsBuffer(file);
          this.repFileMap[name] = new TextDecoder().decode(buf);
        }
      }

      this.parseXML(xmlContent);
      if (Object.keys(this.repFileMap).length === 0) {
        console.warn('⚠️ 未找到 3DRep 文件，模型将只有结构树无几何体');
        console.warn('   请同时选择 .3dxml 和 .3DRep 文件');
      }
    }

    loadingText.textContent = '正在构建模型...';
    return this.buildTree();
  }

  parseXML(xmlText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const root = doc.documentElement;
    const productStructure = root.getElementsByTagName('ProductStructure')[0];
    if (!productStructure) throw new Error('无效的 3DXML：缺少 ProductStructure 节点');

    this.modelRoot = parseInt(productStructure.getAttribute('root'));
    const children = Array.from(productStructure.children);

    // ═══ 第一遍：收集所有 Reference3D 和 ReferenceRep═══
    // 必须先建立完整的 treeDict 和 repDict，
    // 因为 InstanceRep/Instance3D 可能引用的目标在后面才出现
    const deferred = { instanceReps: [], instance3Ds: [] };

    for (const el of children) {
      const type = el.getAttribute('xsi:type')
        || el.getAttributeNS('http://www.w3.org/2001/XMLSchema-instance', 'type')
        || (el.localName || el.tagName).replace(/^.*:/, '');

      if (type === 'Reference3DType' || type === 'Reference3D') {
        const id = parseInt(el.getAttribute('id'));
        const name = el.getAttribute('name') || '';
        // 提取 V_Name 作为默认显示名（中文名称）
        let vname = name;
        for (const c of el.children) {
          const ct = (c.localName || c.tagName || '').replace(/^.*:/, '');
          if (ct === 'V_Name') { vname = c.textContent?.trim() || name; break; }
        }
        this.treeDict[id] = {
          id, name, type: 'assembly',
          children: [], childMatrices: [],
          isLeaf: false, leafParts: [],
          label: vname  // 默认显示 V_Name，后续Instance3D覆盖为实例名
        };
      } else if (type === 'ReferenceRepType' || type === 'ReferenceRep') {
        const id = parseInt(el.getAttribute('id'));
        const name = el.getAttribute('name') || '';
        const associatedFile = el.getAttribute('associatedFile') || '';
        const fileName = associatedFile.split(':').pop();
        const format = el.getAttribute('format') || '';
        if (format === 'UVR') this.isUVR = true;
        this.repDict[id] = { id, name, fileName, format };
      } else if (type === 'InstanceRepType' || type === 'InstanceRep') {
        deferred.instanceReps.push(el);
      } else if (type === 'Instance3DType' || type === 'Instance3D') {
        deferred.instance3Ds.push(el);
      }
    }

    // ═══ 第二遍：先 InstanceRep（标记叶子），再 Instance3D（建立父子+克隆）═══
    // 必须 InstanceRep 在前：克隆时需要 isLeaf/leafParts 已经就位
    let leafCount = 0;
    for (const el of deferred.instanceReps) {
      const els = el.getElementsByTagName('*');
      const aggregatedBy = parseInt(els[0]?.textContent);
      const instanceOf = parseInt(els[1]?.textContent);
      if (this.treeDict[aggregatedBy] && this.repDict[instanceOf]) {
        this.treeDict[aggregatedBy].isLeaf = true;
        this.treeDict[aggregatedBy].leafParts.push(this.repDict[instanceOf]);
        leafCount++;
      }
    }

    for (const el of deferred.instance3Ds) {
      const els = el.getElementsByTagName('*');
      const aggregatedBy = parseInt(els[0]?.textContent);
      const instanceOf = parseInt(els[1]?.textContent);
      const matrixStr = els[2]?.textContent || '1 0 0 0 1 0 0 0 1 0 0 0';
      const instanceName = el.getAttribute('name') || '';
      if (this.treeDict[aggregatedBy] && this.treeDict[instanceOf]) {
        let childNode = this.treeDict[instanceOf];
        if (instanceName && instanceName !== childNode.label) {
          // 浅克隆+唯一ID：每个实例独立标识，便于树节点点击准确定位
          childNode = Object.assign({}, childNode);
          childNode.label = instanceName;
          childNode.id = this._cloneId++;
          this.treeDict[childNode.id] = childNode;
        } else if (instanceName) {
          childNode.label = instanceName;
        }
        this.treeDict[aggregatedBy].children.push(childNode);
        this.treeDict[aggregatedBy].childMatrices.push(matrixStr);
      }
    }
    console.log('📊 解析完成: ' + Object.keys(this.treeDict).length + ' 个结构节点, ' +
      Object.keys(this.repDict).length + ' 个几何引用, ' + leafCount + ' 个零件绑定' +
      (this.isUVR ? ' (UVR二进制格式，渲染球体占位)' : ''));
  }

  buildTree() {
    if (!this.treeDict[this.modelRoot]) {
      throw new Error('找不到模型根节点 id=' + this.modelRoot);
    }
    return this.treeDict[this.modelRoot];
  }

  // 参考 Unity ModelTree.cs 的实现方式：
  // 3DXML 的 12 值矩阵 = 行主序 4×3，前三行分别为 X/Y/Z 轴方向 + 平移
  // Unity 左手法则对 X 取反；Three.js 右手法则（同CATIA）不取反
  parseMatrix(matrixStr) {
    const values = matrixStr.trim().split(/\s+/).map(parseFloat);
    if (values.length < 12) return new THREE.Matrix4().identity();
    const m = values;

    // 直接从矩阵的行提取轴向量（参照Unity LookRotation逻辑，但不去反X）
    // Row 1 (m3,m4,m5) = Y轴方向（CATIA中的"上"）
    // Row 2 (m6,m7,m8) = Z轴方向（CATIA中的"前"）
    const right   = new THREE.Vector3( m[0],  m[1],  m[2]).normalize();
    const up      = new THREE.Vector3( m[3],  m[4],  m[5]).normalize();
    const forward = new THREE.Vector3( m[6],  m[7],  m[8]).normalize();

    // 施密特正交化确保三个轴严格正交（与Unity LookRotation内部行为一致）
    const correctedRight   = new THREE.Vector3().crossVectors(up, forward).normalize();
    const correctedUp      = new THREE.Vector3().crossVectors(forward, correctedRight).normalize();
    const correctedForward = new THREE.Vector3().crossVectors(correctedRight, correctedUp).normalize();

    const mat4 = new THREE.Matrix4();
    mat4.makeBasis(correctedRight, correctedUp, correctedForward);
    mat4.setPosition(m[9], m[10], m[11]);
    return mat4;
  }

  // 根据 id 生成确定性颜色（当 3DRep 没有 RGB 颜色时使用，类似 RepPart.cs 中的随机色逻辑）
  _makeDefaultColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i) | 0;
    const H = ((hash & 0xFFFF) / 0xFFFF + 0.618033988749895) % 1.0;
    const S = 0.25 + 0.25 * (((hash >> 16) & 0xFFFF) / 0xFFFF);
    const V = 0.55 + 0.35 * (((hash >> 8) & 0xFFFF) / 0xFFFF);
    const c = new THREE.Color().setHSL(H, S, V);
    return [c.r, c.g, c.b, 1.0];
  }

  parse3DRep(fileName) {
    const content = this.repFileMap[fileName];
    if (!content) return [];
    const parser = new DOMParser();
    const doc = parser.parseFromString(content, 'text/xml');

    // 辅助：获取元素 localName（兼容命名空间）
    const _tag = (el) => (el.localName || el.tagName || '').replace(/^.*:/, '');
    // 辅助：获取 xsi:type 值
    const _xsiType = (el) => el.getAttribute('xsi:type') ||
      el.getAttributeNS('http://www.w3.org/2001/XMLSchema-instance', 'type') || '';

    // 迭代查找所有 PolygonalRepType 的 <Rep> 节点（用栈避免递归溢出）
    const polyReps = [];
    const stack = [doc.documentElement]; // 从 <XMLRepresentation> 开始
    while (stack.length > 0) {
      const node = stack.pop();
      for (const child of node.children || []) {
        const tag = _tag(child);
        if (tag === 'Rep') {
          const xt = _xsiType(child);
          if (xt === 'PolygonalRepType' || xt === 'PolygonalRep') {
            polyReps.push(child);
          } else {
            stack.push(child); // BagRepType → 深入
          }
        } else if (tag === 'Root') {
          stack.push(child);
        }
      }
    }

    if (polyReps.length === 0 && this._dbgOnce !== fileName) {
      this._dbgOnce = fileName;
      console.warn('⚠️ parse3DRep: 未找到 PolygonalRepType, 文件=' + fileName +
        ', 长度=' + content.length + ', 头=' + content.substring(0, 100));
    }

    const defaultColor = this._makeDefaultColor(fileName);
    const instances = [];

    // 安全批量追加：避免 push(...largeArray) 栈溢出
    const _pushAll = (target, source) => {
      for (let i = 0; i < source.length; i++) target.push(source[i]);
    };

    for (const polyRep of polyReps) {
      // ── 收集 Faces（可能在 PolygonalLOD 内）和 VertexBuffer ──
      let vertexBufEl = null;
      let facesEl = null;              // 直接 <Faces>（无LOD层级）
      const lodFaces = [];            // { accuracy, facesEl }

      for (const child of polyRep.children) {
        const t = _tag(child);
        if (t === 'VertexBuffer') {
          vertexBufEl = child;
        } else if (t === 'Faces') {
          facesEl = child;
        } else if (t === 'PolygonalLOD') {
          const acc = parseFloat(child.getAttribute('accuracy') || 'Infinity');
          for (const lodChild of child.children) {
            if (_tag(lodChild) === 'Faces') {
              lodFaces.push({ accuracy: acc, facesEl: lodChild });
            }
          }
        }
      }

      if (!vertexBufEl) continue;

      // 优先使用直接 <Faces>，否则选用最高精度的 LOD（accuracy值最小）
      let useFacesEl = facesEl;
      if (!useFacesEl && lodFaces.length > 0) {
        lodFaces.sort((a, b) => a.accuracy - b.accuracy);
        useFacesEl = lodFaces[0].facesEl;
      }
      if (!useFacesEl) continue;

      // ── 解析顶点 ──
      let positionsEl = null, normalsEl = null;
      for (const child of vertexBufEl.children) {
        const t = _tag(child);
        if (t === 'Positions') positionsEl = child;
        else if (t === 'Normals') normalsEl = child;
      }
      if (!positionsEl) continue;

      const posStrs = positionsEl.textContent.split(/[,\s]+/).filter(s => s.trim());
      const positions = posStrs.map(parseFloat).filter(n => !isNaN(n));

      let normals = [];
      if (normalsEl) {
        const nrmStrs = normalsEl.textContent.split(/[,\s]+/).filter(s => s.trim());
        normals = nrmStrs.map(parseFloat).filter(n => !isNaN(n));
      }

      if (positions.length < 9) continue;

      // ── 解析面片（支持 triangles / strips / fans）──
      const colorRanges = [];
      const allTriangles = [];
      let oldColor = null;

      for (const faceEl of useFacesEl.children) {
        if (_tag(faceEl) !== 'Face') continue;

        const indices = [];

        // 1) 普通三角形列表
        const triStr = faceEl.getAttribute('triangles') || '';
        if (triStr.trim()) {
          _pushAll(indices, triStr.trim().split(/\s+/).map(Number).filter(n => !isNaN(n)));
        }

        // 2) 三角形条带（逗号分隔多个 strip，奇数三角形翻转绕序）
        const stripStr = faceEl.getAttribute('strips') || '';
        if (stripStr.trim()) {
          const strips = stripStr.split(',').filter(s => s.trim());
          for (const strip of strips) {
            const si = strip.trim().split(/\s+/).map(Number).filter(n => !isNaN(n));
            for (let i = 0; i < si.length - 2; i++) {
              if (i % 2 === 0) {
                indices.push(si[i], si[i + 1], si[i + 2]);
              } else {
                indices.push(si[i + 1], si[i], si[i + 2]);
              }
            }
          }
        }

        // 3) 三角形扇（逗号分隔多个 fan，第一个顶点为共享中心）
        const fanStr = faceEl.getAttribute('fans') || '';
        if (fanStr.trim()) {
          const fans = fanStr.split(',').filter(s => s.trim());
          for (const fan of fans) {
            const fi = fan.trim().split(/\s+/).map(Number).filter(n => !isNaN(n));
            for (let i = 1; i < fi.length - 1; i++) {
              indices.push(fi[0], fi[i], fi[i + 1]);
            }
          }
        }

        if (indices.length === 0) continue;

        // ── 颜色 ──
        const extractColor = () => {
          for (const c1 of faceEl.children) {
            if (_tag(c1) !== 'SurfaceAttributes') continue;
            for (const c2 of c1.children) {
              if (_tag(c2) === 'Color') {
                const r = parseFloat(c2.getAttribute('red'));
                const g = parseFloat(c2.getAttribute('green'));
                const b = parseFloat(c2.getAttribute('blue'));
                const a = parseFloat(c2.getAttribute('alpha') || '1');
                if (!isNaN(r) && !isNaN(g) && !isNaN(b) && !isNaN(a)) {
                  return [r, g, b, a];
                }
              }
            }
          }
          return null;
        };
        let rgba = extractColor();
        if (!rgba) rgba = [...defaultColor];

        const colorKey = rgba.join(',');
        if (colorKey !== oldColor) {
          colorRanges.push({ start: allTriangles.length, color: [...rgba] });
          oldColor = colorKey;
        }
        _pushAll(allTriangles, indices);
      }

      if (colorRanges.length === 0 || allTriangles.length === 0) continue;
      for (let i = 0; i < colorRanges.length; i++) {
        colorRanges[i].end = (i + 1 < colorRanges.length)
          ? colorRanges[i + 1].start : allTriangles.length;
      }

      instances.push({ positions, normals, triangles: allTriangles, colorRanges });
    }
    if (polyReps.length > 0) {
      console.log('  🔧 ' + fileName + ': ' + polyReps.length + ' 个PolygonalRep, ' + instances.length + ' 个几何实例');
    }
    return instances;
  }

  // 3MF 解析（ZIP+XML，永远三角面片）
  async parse3MF(buffer) {
    loadingText.textContent = '正在解析 3MF...';
    const zip = await JSZip.loadAsync(buffer);
    // 3MF 结构: ZIP → 3D/3dmodel.model
    const modelFile = zip.file('3D/3dmodel.model') || zip.file(/3dmodel\.model$/i)[0];
    if (!modelFile) throw new Error('3MF: 找不到 3dmodel.model');
    const xml = await modelFile.async('text');
    const doc = new DOMParser().parseFromString(xml, 'text/xml');

    this.is3MF = true;
    this.mf3Data = { objects: [] };

    // 解析 resources → object → mesh
    const resources = doc.getElementsByTagName('resources')[0];
    if (!resources) throw new Error('3MF: 缺少 resources');
    const objs = resources.getElementsByTagName('object');
    for (const obj of objs) {
      const mesh = obj.getElementsByTagName('mesh')[0];
      if (!mesh) continue;
      const vertEls = mesh.getElementsByTagName('vertices')[0]?.getElementsByTagName('vertex') || [];
      const triEls = mesh.getElementsByTagName('triangles')[0]?.getElementsByTagName('triangle') || [];
      if (vertEls.length === 0 || triEls.length === 0) continue;

      const positions = []; const indices = [];
      for (const v of vertEls) {
        positions.push(parseFloat(v.getAttribute('x')||0), parseFloat(v.getAttribute('y')||0), parseFloat(v.getAttribute('z')||0));
      }
      for (const t of triEls) {
        indices.push(parseInt(t.getAttribute('v1')||0), parseInt(t.getAttribute('v2')||0), parseInt(t.getAttribute('v3')||0));
      }
      if (positions.length > 0) {
        this.mf3Data.objects.push({ positions, indices });
      }
    }
    console.log('3MF: ' + this.mf3Data.objects.length + ' objects');
    if (this.mf3Data.objects.length === 0) throw new Error('3MF: 无几何体');
    return this.buildTree(); // 返回空树（3MF不用树）
  }

  buildTree() {
    if (!this.treeDict[this.modelRoot] && !this.is3MF) {
      throw new Error('找不到模型根节点 id=' + this.modelRoot);
    }
    return this.treeDict[this.modelRoot] || { name: '3MF Model', children: [], isLeaf: true, leafParts: [{ name: '3MF', fileName: '__3mf__', format: '3MF' }] };
  }
}

// ═══════════════════════════════════════════════════
// 模型构建器（几何缓存避免重复解析同一 3DRep）
// ═══════════════════════════════════════════════════
const sharedGeomCache = new Map(); // fileName → [{geometry, materials[]}]

let _bmtMaxDepth = 0;
function buildModelFromTree(treeNode, parser, parentGroup, parentTransform, path = '', depth = 0) {
  if (depth > _bmtMaxDepth) { _bmtMaxDepth = depth; }
  if (depth > 200) { console.warn('⚠️ buildModelFromTree深度=' + depth + ', 节点=' + treeNode.name); }
  const currentPath = path ? path + '/' + treeNode.name : treeNode.name;
  const group = new THREE.Group();
  group.name = treeNode.name;

  if (parentTransform) {
    // 直接设矩阵避免 decompose 精度损失，对深层嵌套装配体尤其重要
    group.matrix.copy(parentTransform);
    group.matrixAutoUpdate = false;
  }

  if (treeNode.isLeaf) {
    for (const leafPart of treeNode.leafParts) {
      let cached;
      if (parser.is3MF) {
        // ──── 3MF 格式 ────
        const key = '__3mf_geom__' + leafPart.fileName;
        cached = sharedGeomCache.get(key);
        if (!cached) {
          cached = [];
          for (const obj of parser.mf3Data.objects) {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(obj.positions), 3));
            geo.setIndex(new THREE.BufferAttribute(new Uint32Array(obj.indices), 1));
            geo.computeVertexNormals();
            const mat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.5, metalness: 0.1 });
            cached.push({ geometry: geo, materials: [mat] });
          }
          sharedGeomCache.set(key, cached);
        }
        for (const item of cached) {
          const mesh = new THREE.Mesh(item.geometry, item.materials[0]);
          mesh.castShadow = true; mesh.receiveShadow = true;
          mesh.name = leafPart.name || '3MF';
          mesh.userData = { treeNodeId: treeNode.id, partName: leafPart.name };
          group.add(mesh);
        }
      } else if (parser.isUVR) {
        // ──── UVR 二进制 → 渲染球体（焊点球）────
        cached = sharedGeomCache.get('__uvr_sphere__');
        if (!cached) {
          const geo = new THREE.SphereGeometry(1, 12, 8);
          const mat = new THREE.MeshStandardMaterial({
            color: 0xff4444, roughness: 0.3, metalness: 0.2
          });
          cached = [{ geometry: geo, materials: [mat] }];
          sharedGeomCache.set('__uvr_sphere__', cached);
        }
        for (const item of cached) {
          const mesh = new THREE.Mesh(item.geometry, item.materials[0]);
          mesh.castShadow = true; mesh.receiveShadow = true;
          const scale = 12; // 焊点球半径12mm，在模型尺度下可见
          mesh.scale.set(scale, scale, scale);
          mesh.name = leafPart.name || treeNode.name;
          mesh.userData = { treeNodeId: treeNode.id, partName: leafPart.name };
          group.add(mesh);
        }
      } else {
        // ──── TESSELLATED XML → 正常解析 ────
        cached = sharedGeomCache.get(leafPart.fileName);
        if (!cached) {
          cached = [];
          const repInstances = parser.parse3DRep(leafPart.fileName);
          for (const inst of repInstances) {
            const posArr = new Float32Array(inst.positions);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            if (inst.normals.length > 0 && inst.normals.length === inst.positions.length) {
              geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(inst.normals), 3));
            }
            const idxArr = new Uint32Array(inst.triangles);
            geo.setIndex(new THREE.BufferAttribute(idxArr, 1));
            if (inst.normals.length === 0 || inst.normals.length !== inst.positions.length) {
              geo.computeVertexNormals();
            }
            geo.clearGroups();
            const materials = [];
            for (let g = 0; g < inst.colorRanges.length; g++) {
              const range = inst.colorRanges[g];
              geo.addGroup(range.start, range.end - range.start, g);
              const [r, gC, b, a] = range.color;
              materials.push(new THREE.MeshStandardMaterial({
                color: new THREE.Color(r, gC, b),
                roughness: 0.55, metalness: 0.05,
                transparent: a < 0.99, opacity: Math.max(0.05, a),
                depthWrite: a > 0.7, side: THREE.FrontSide
              }));
          }
          cached.push({ geometry: geo, materials });
        }
        sharedGeomCache.set(leafPart.fileName, cached);
        }
      }
      // 复用缓存的几何体（共享 geometry，材质每个实例独立引用以避免批量状态问题）
      for (const item of cached) {
        const mesh = item.materials.length === 1
          ? new THREE.Mesh(item.geometry, item.materials[0])
          : new THREE.Mesh(item.geometry, item.materials.slice());
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.name = leafPart.name || treeNode.name;
        mesh.userData = { treeNodeId: treeNode.id, partName: leafPart.name };
        group.add(mesh);
      }
      // 映射到 group 数组（同一零件可能被多次实例化）
      if (!entityMap.has(treeNode.id)) entityMap.set(treeNode.id, []);
      entityMap.get(treeNode.id).push(group);
    }
  } else {
    // 非叶子：递归处理子节点
    for (let i = 0; i < treeNode.children.length; i++) {
      const child = treeNode.children[i];
      const matrixStr = treeNode.childMatrices[i] || '1 0 0 0 1 0 0 0 1 0 0 0';
      const transform = parser.parseMatrix(matrixStr);
      buildModelFromTree(child, parser, group, transform, currentPath, depth + 1);
    }
  }

  // 如果 group 是空的叶子但没有子group（装配体无零件），加个标记
  if (group.children.length === 0 && !treeNode.isLeaf) {
    // 空装配体，跳过
  }

  group.userData = { treeNodeId: treeNode.id, name: treeNode.name, path: currentPath };
  parentGroup.add(group);
  if (!entityMap.has(treeNode.id)) entityMap.set(treeNode.id, []);
  entityMap.get(treeNode.id).push(group);
}

// ═══════════════════════════════════════════════════
// 结构树 UI 构建
// ═══════════════════════════════════════════════════
function buildTreeUI(node, container, depth = 0) {
  const nodeDiv = document.createElement('div');
  nodeDiv.className = 'tree-node';
  nodeDiv.style.paddingLeft = (14 + depth * 20) + 'px';
  nodeDiv.dataset.nodeId = node.id;

  const hasChildren = node.children && node.children.length > 0;
  const isLeaf = node.isLeaf;

  // 展开箭头
  const arrow = document.createElement('span');
  arrow.className = 'arrow' + (depth < 3 ? ' expanded' : '');
  arrow.textContent = hasChildren ? '▶' : '';
  arrow.style.visibility = hasChildren ? 'visible' : 'hidden';
  nodeDiv.appendChild(arrow);

  // 显示/隐藏复选框
  const check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'check';
  check.checked = true;
  check.title = '显示/隐藏';
  check.addEventListener('click', (e) => {
    e.stopPropagation();
    const targets = entityMap.get(node.id);
    if (targets) targets.forEach(t => t.visible = check.checked);
  });
  nodeDiv.appendChild(check);

  // 图标
  const icon = document.createElement('span');
  icon.className = 'icon';
  icon.textContent = isLeaf ? '🔧' : hasChildren ? '📦' : '📁';
  nodeDiv.appendChild(icon);

  // 名称
  const nameSpan = document.createElement('span');
  nameSpan.className = 'name';
  const label = node.label || '';
  const pn = node.name || '';
  if (label && pn && label !== pn) {
    nameSpan.textContent = pn + '(' + label + ')';
  } else {
    nameSpan.textContent = pn || label || '(未命名)';
  }
  nodeDiv.appendChild(nameSpan);

  // 点击事件
  nodeDiv.addEventListener('click', (e) => {
    e.stopPropagation();
    selectTreeNode(node.id, nodeDiv);
  });

  container.appendChild(nodeDiv);

  // 子节点容器
  const childContainer = document.createElement('div');
  childContainer.className = 'tree-children';
  if (depth >= 3) childContainer.classList.add('collapsed');
  container.appendChild(childContainer);

  // 箭头切换展开/折叠
  if (hasChildren) {
    arrow.addEventListener('click', (e) => {
      e.stopPropagation();
      const isExpanded = arrow.classList.toggle('expanded');
      childContainer.classList.toggle('collapsed', !isExpanded);
    });

    for (const child of node.children) {
      buildTreeUI(child, childContainer, depth + 1);
    }
  }

  return nodeDiv;
}

// ═══════════════════════════════════════════════════
// 选中树节点 → 高亮对应 3D 对象
// ═══════════════════════════════════════════════════
function selectTreeNode(nodeId, nodeDiv) {
  // 清除之前的高亮
  clearHighlight();
  // 清除之前的选中样式
  treeList.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));

  if (nodeDiv) nodeDiv.classList.add('selected');
  selectedNodeId = nodeId;

  const objs = entityMap.get(nodeId);
  if (!objs || objs.length === 0) { console.warn('selectTreeNode: entityMap未找到 id=' + nodeId); return; }

  // 先刷新世界矩阵（group 可能 matrixAutoUpdate=false）
  scene.updateMatrixWorld();

  // 聚焦相机到对象（视觉跟随激活时才移动，合并所有实例包围盒）
  const follow = document.getElementById('chk-follow');
  if (follow && follow.checked) {
    const bbox = new THREE.Box3();
    for (const obj of objs) bbox.expandByObject(obj);
    if (!bbox.isEmpty()) {
    const center = new THREE.Vector3();
    bbox.getCenter(center);
    const size = new THREE.Vector3();
    bbox.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z, 1.0);  // 最小1mm防止焊点等极小物体
    const fov = camera.fov * (Math.PI / 180);
    const dist = Math.max(maxDim / (2 * Math.tan(fov / 2)) * 1.6, maxDim * 2);

    // 平滑动画
    const startTarget = controls.target.clone();
    const startPos = camera.position.clone();
    const endTarget = center.clone();
    const endPos = center.clone().add(
      new THREE.Vector3(dist * 0.5, dist * 0.4, dist * 0.8)
    );

    const startTime = Date.now();
    const duration = 600;
    function animateCamera() {
      const elapsed = Date.now() - startTime;
      const t = Math.min(elapsed / duration, 1.0);
      // easeInOutCubic
      const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      controls.target.lerpVectors(startTarget, endTarget, ease);
      camera.position.lerpVectors(startPos, endPos, ease);
      controls.update();
      if (t < 1) {
        requestAnimationFrame(animateCamera);
      }
    }
    animateCamera();
    }
  }

  // 添加高亮叠加层（所有实例）
  for (const obj of objs) {
    obj.traverse((child) => {
      if (child.isMesh) {
        const hlMesh = new THREE.Mesh(child.geometry, highlightMaterial.clone());
        hlMesh.position.copy(child.position);
        hlMesh.rotation.copy(child.rotation);
        hlMesh.scale.copy(child.scale);
        hlMesh.matrixAutoUpdate = false;
        hlMesh.matrix.copy(child.matrixWorld);
        hlMesh.renderOrder = 999;
        hlMesh.material.depthTest = true;
        scene.add(hlMesh);
        highlightMeshes.push(hlMesh);
      }
    });
  }


}

function clearHighlight() {
  for (const mesh of highlightMeshes) {
    if (mesh.geometry) mesh.geometry.dispose();
    if (mesh.material) mesh.material.dispose();
    scene.remove(mesh);
  }
  highlightMeshes = [];
  selectedNodeId = null;
}

// UI 辅助函数

function showLoading(show) {
  loadingEl.classList.toggle('hidden', !show);
}
function openTreePanel() {

}

// ═══════════════════════════════════════════════════
// 主流程：打开并加载文件
// ═══════════════════════════════════════════════════
async function openFiles(fileList) {
  const files = Array.isArray(fileList) ? fileList : [fileList];
  if (files.length === 0) return;

  try {
    showLoading(true);
    loadingText.textContent = '正在读取文件...';

    // 清除旧模型
    clearHighlight();
    entityMap.clear();
    sharedGeomCache.clear();
    while (rootGroup.children.length > 0) {
      disposeObject(rootGroup.children[0]);
      rootGroup.remove(rootGroup.children[0]);
    }
    treeList.innerHTML = '';

    // 解析（传入文件数组）
    const parser = new ThreeDXMLParser();
    loadingText.textContent = '正在解析结构...';
    const tree = await parser.load(files);
    loadingText.textContent = '解析完成: ' +
      Object.keys(parser.treeDict).length + '节点 ' +
      Object.keys(parser.repDict).length + '几何 ' +
      (parser.isUVR ? 'UVR' : parser.is3MF ? '3MF' : 'TESSELLATED');

    // 构建 3D 模型
    loadingText.textContent = '正在渲染模型...';
    console.log('🔨 开始构建模型, 根节点=' + tree.name + ', isLeaf=' + tree.isLeaf);
    try {
      buildModelFromTree(tree, parser, rootGroup, null);
      console.log('✅ buildModelFromTree 完成, rootGroup.children=' + rootGroup.children.length +
        ', 最大树深度=' + _bmtMaxDepth);
    } catch (e) {
      console.error('❌ buildModelFromTree 失败:', e.message || e, e.stack);
      throw e;
    }

    // 保存树数据
    modelTreeData = tree;

    // 更新场景包围盒 + 动态设置相机和控制范围
    const bbox = new THREE.Box3().setFromObject(rootGroup);
    if (!bbox.isEmpty()) {
      const center = new THREE.Vector3();
      bbox.getCenter(center);
      const size = new THREE.Vector3();
      bbox.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z, 0.01);
      // 让模型在屏幕中约占 40% 面积（视角方向）
      const fitDist = maxDim / (2 * Math.tan((camera.fov * 0.65) * Math.PI / 360));
      const viewDist = fitDist * 2.0;
      // Y-up：从斜上方（偏右前）观察
      camera.position.set(viewDist * 0.55, viewDist * 0.5, viewDist * 0.7);
      controls.target.copy(center);
      controls.minDistance = maxDim * 0.01;
      controls.maxDistance = viewDist * 10; // 可以缩到很远看整体
      // 更新阴影和灯光
      dirLight.shadow.camera.far = maxDim * 4;
      dirLight.position.copy(center.clone().add(new THREE.Vector3(maxDim * 0.8, maxDim * 1.2, maxDim * 0.8)));
      dirLight.shadow.camera.left = -maxDim;
      dirLight.shadow.camera.right = maxDim;
      dirLight.shadow.camera.top = maxDim;
      dirLight.shadow.camera.bottom = -maxDim;
    } else {
      // 无几何体，保持默认
      let meshCount = 0; rootGroup.traverse(c => { if (c.isMesh) meshCount++; });
      loadingText.textContent = '❌ 无几何! 节点:' +
        Object.keys(parser.treeDict).length + ' 几何:' +
        Object.keys(parser.repDict).length + ' 零件:' + meshCount;
      console.warn('场景中没有 3D 几何体，请确保同时加载了 .3dxml 和 .3DRep 文件');
    }

    // 构建结构树 UI
    treeList.innerHTML = '';
    buildTreeUI(tree, treeList);

    // 更新标题
    const xmlFile = files.find(f => /\.3dxml$/i.test(f.name));
    titleText.textContent = xmlFile ? xmlFile.name.replace(/\.3dxml$/i, '') : (files[0].name || '模型');

    controls.update();
    showLoading(false);

    const welcome = document.getElementById('welcome');
    if (parser.is3MF) {
      welcome.innerHTML = '<span class="icon">📐</span><span class="msg">3MF 模型</span><span class="sub">三角面片已加载</span>';
      welcome.style.display = 'block';
      setTimeout(() => { welcome.style.display = 'none'; }, 3000);
    } else if (parser.isUVR) {
      welcome.innerHTML = '<span class="icon">🟠</span><span class="msg">UVR 焊点球模式</span><span class="sub">二进制几何已转为球体显示</span>';
      welcome.style.display = 'block';
    } else {
      welcome.style.display = 'none';
    }
    gestureHint.style.opacity = '1';
    setTimeout(() => { gestureHint.style.opacity = '0'; }, 8000);

  } catch (err) {
    console.error(err);
    showLoading(false);
    alert('加载失败：' + (err.message || err));
    titleText.textContent = '3DXML 查看器';
  }
}

// 递归销毁对象
function disposeObject(obj) {
  obj.traverse((child) => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => m.dispose());
      } else {
        child.material.dispose();
      }
    }
  });
  if (obj.parent) obj.parent.remove(obj);
}

// 结构树面板滑动手势（单指左右滑移动面板）
(function() {
  const panel = document.getElementById('tree-panel');
  let swipeStartX = 0, swipeStartLeft = 0, swiping = false;
  panel.addEventListener('touchstart', (e) => {
    if (e.target.closest('button,input,.tree-resizer')) return;
    swipeStartX = e.touches[0].clientX;
    swipeStartLeft = parseFloat(panel.style.left) || 0;
    swiping = true;
  }, { passive: false });
  panel.addEventListener('touchmove', (e) => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - swipeStartX;
    panel.style.transition = 'none';
    panel.style.transform = `translateX(${Math.max(-50, Math.min(50, swipeStartLeft + dx))}px)`;
    e.preventDefault();
  }, { passive: false });
  panel.addEventListener('touchend', () => {
    swiping = false;
    panel.style.transition = 'transform 0.25s ease';
    panel.style.transform = 'translateX(0)';
    panel.style.left = '0';
  });
})();

// 结构树宽度拖拽调整
(function() {
  const resizer = document.getElementById('tree-resizer');
  const panel = document.getElementById('tree-panel');
  let startX, startW;
  resizer.addEventListener('pointerdown', (e) => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startW = panel.offsetWidth;
    resizer.classList.add('active');
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
  function onMove(e) {
    const w = Math.max(220, Math.min(startW + e.clientX - startX, window.innerWidth * 0.85));
    panel.style.width = w + 'px';
  }
  function onUp() {
    resizer.classList.remove('active');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
  }
})();

// 适应视图按钮
document.getElementById('btn-fit').addEventListener('click', () => {
  clearHighlight();
  treeList.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));
  selectedNodeId = null;
  const bbox = new THREE.Box3().setFromObject(rootGroup);
  if (!bbox.isEmpty()) {

    bbox.getCenter(center);
    const size = new THREE.Vector3();
    bbox.getSize(size);

// 单击/双击高亮（单击选零件，双击选零件+聚焦）
let _clickStart = { x: 0, y: 0 };
renderer.domElement.addEventListener('pointerdown', (e) => {
  _clickStart = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('pointerup', (e) => {
  const dx = e.clientX - _clickStart.x;
  const dy = e.clientY - _clickStart.y;
  if (Math.sqrt(dx * dx + dy * dy) > 4) return; // 拖拽旋转，不算点击

  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(rootGroup.children, true);
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj) {
      if (obj.userData && obj.userData.treeNodeId != null) {
        const nodeId = obj.userData.treeNodeId;
        const nodeDiv = treeList.querySelector(`[data-node-id="${nodeId}"]`);
        if (!nodeDiv) console.warn('点击零件未找到树节点: id=' + nodeId);
        selectTreeNode(nodeId, nodeDiv);
        if (nodeDiv) {
          // 自动展开所有折叠的父节点
          let parent = nodeDiv.parentElement;
          while (parent && parent.id !== 'tree-list') {
            if (parent.classList.contains('tree-children')) {
              parent.classList.remove('collapsed');
              const arrow = parent.previousElementSibling?.querySelector('.arrow');
              if (arrow) arrow.classList.add('expanded');
            }
            parent = parent.parentElement;
          }
          nodeDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }
      obj = obj.parent;
    }
    console.warn('点击零件未找到treeNodeId');
  }
});

// 双击聚焦
renderer.domElement.addEventListener('dblclick', (e) => {
  // 射线检测点击的对象
  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(rootGroup.children, true);
  if (intersects.length > 0) {
    // 找到最接近的带 treeNodeId 的祖先
    let obj = intersects[0].object;
    while (obj) {
      if (obj.userData && obj.userData.treeNodeId != null) {
        const nodeId = obj.userData.treeNodeId;
        const nodeDiv = treeList.querySelector(`[data-node-id="${nodeId}"]`);
        selectTreeNode(nodeId, nodeDiv);
        if (nodeDiv) {
          // 自动展开所有折叠的父节点
          let parent = nodeDiv.parentElement;
          while (parent && parent.id !== 'tree-list') {
            if (parent.classList.contains('tree-children')) {
              parent.classList.remove('collapsed');
              const arrow = parent.previousElementSibling?.querySelector('.arrow');
              if (arrow) arrow.classList.add('expanded');
            }
            parent = parent.parentElement;
          }
          nodeDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }
      obj = obj.parent;
    }
  }
});

});

// PWA 安装
let deferredPrompt = null;
const btnInstall = document.getElementById('btn-install');
// 手机端始终显示按钮
if (/Mobi|Android/i.test(navigator.userAgent)) btnInstall.style.display = 'flex';

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = 'flex';
});
btnInstall.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    btnInstall.style.display = outcome === 'accepted' ? 'none' : 'flex';
    deferredPrompt = null;
  } else {
    // 浏览器不支持原生安装提示，引导手动操作
    alert('请使用浏览器菜单安装：\n\n• Edge: 点底部 ⋮ → "添加到手机"\n• Chrome: 点右上 ⋮ → "添加到主屏幕"\n• Safari: 点分享按钮 → "添加到主屏幕"');

});
